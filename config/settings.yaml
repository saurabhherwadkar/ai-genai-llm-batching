# settings.yaml
# Application configuration for the LLM Batching project.
# Values here can be overridden by environment variables prefixed with LLM_BATCH_.
# Example: LLM_BATCH_API_KEY=sk-xxx overrides api_key below.

# LLM API connection settings
api_base_url: "https://api.openai.com/v1"
# API key should be set via environment variable LLM_BATCH_API_KEY (never commit secrets)
api_key: ""

# Batching configuration
# Number of requests to group into a single processing batch
batch_size: 5
# Maximum number of API calls to make simultaneously
max_concurrent_requests: 3

# HTTP request settings
# Timeout for each individual API request in seconds
request_timeout_seconds: 30.0
# Number of retry attempts for failed requests
max_retries: 3
# Base delay between retries (exponential backoff multiplier applied)
retry_delay_seconds: 1.0

# Default LLM model parameters
# Model identifier to use when not specified per-request
default_model: "gpt-3.5-turbo"
# Maximum tokens to generate per response
default_max_tokens: 256
# Sampling temperature (0.0 = deterministic, 1.0 = maximum randomness)
default_temperature: 0.7

# Logging configuration
# Available levels: DEBUG, INFO, WARN, ERROR
log_level: "INFO"
